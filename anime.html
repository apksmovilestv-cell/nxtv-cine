<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime - NXTV</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: sans-serif; }
        
        /* Header con flecha */
        .header { display: flex; align-items: center; padding: 15px; background: #000; border-bottom: 2px solid #e50914; }
        .back-btn { font-size: 24px; color: #e50914; text-decoration: none; margin-right: 15px; }
        .title { font-weight: bold; color: #e50914; font-size: 20px; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .card { background: #111; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card p { margin: 10px; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="back-btn">⬅</a>
        <div class="title">ANIME</div>
    </header>

    <div class="grid">
        <!-- Aquí agregarás tus animes -->
        <div class="card">
            <img src="URL_DE_IMAGEN" alt="Anime">
            <p>Nombre del Anime</p>
        </div>
    </div>

</body>
</html>
