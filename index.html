<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXTV - Streaming</title>
    <style>
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; padding-bottom: 70px; }
        
        /* Header */
        .header { padding: 20px; background: #000; text-align: center; border-bottom: 2px solid #e50914; font-size: 24px; font-weight: bold; color: #e50914; }
        
        /* Banner */
        .banner { width: 100%; height: 200px; overflow: hidden; position: relative; }
        .banner img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .banner img.active { display: block; }

        /* Menú Inferior */
        .nav-bottom { position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around; background: #111; padding: 12px 0; border-top: 2px solid #e50914; }
        .nav-bottom a { color: #fff; text-decoration: none; font-size: 16px; font-weight: bold; text-align: center; display: flex; flex-direction: column; }
        .nav-bottom a span { font-size: 20px; margin-bottom: 3px; }
    </style>
</head>
<body>

    <header class="header">NXTV</header>

    <div class="banner" id="banner">
        <img src="https://via.placeholder.com/800x300/222/fff?text=ESTRENO+1" class="active">
        <img src="https://via.placeholder.com/800x300/333/fff?text=ESTRENO+2">
        <img src="https://via.placeholder.com/800x300/444/fff?text=ESTRENO+3">
    </div>

    <!-- Menú Abajo con Emojis -->
    <nav class="nav-bottom">
        <a href="index.html"><span>🏠</span>Inicio</a>
        <a href="peliculas.html"><span>🎬</span>Películas</a>
        <a href="series.html"><span>📺</span>Series</a>
        <a href="anime.html"><span>🏮</span>Anime</a>
    </nav>

    <script>
        let index = 0;
        const images = document.querySelectorAll(".banner img");
        function changeImage() {
            images[index].classList.remove("active");
            index = (index + 1) % images.length;
            images[index].classList.add("active");
        }
        setInterval(changeImage, 3000);
    </script>
</body>
</html>
