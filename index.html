<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXTV - Streaming</title>
    <style>
        body { margin: 0; background-color: #050505; color: #fff; font-family: sans-serif; }
        /* Menú Hamburguesa */
        .header { display: flex; justify-content: space-between; padding: 20px; align-items: center; }
        .menu-btn { font-size: 30px; cursor: pointer; color: #e50914; }
        /* Banner (La cosa automática) */
        .banner { width: 100%; height: 250px; background: #222; display: flex; align-items: center; justify-content: center; border-bottom: 3px solid #e50914; }
        /* Lista de Secciones */
        .nav-menu { display: none; background: #111; padding: 20px; position: absolute; width: 100%; top: 70px; }
        .nav-menu a { display: block; color: white; padding: 15px; text-decoration: none; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight:bold; font-size:24px;">NXTV</div>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
    </div>

    <div id="nav" class="nav-menu">
        <a href="peliculas.html">Películas</a>
        <a href="series.html">Series</a>
        <a href="anime.html">Anime</a>
    </div>

    <div class="banner">
        <p>BANNER AUTOMÁTICO (Aquí irán tus destacados)</p>
    </div>

    <script>
        function toggleMenu() {
            var x = document.getElementById("nav");
            if (x.style.display === "block") { x.style.display = "none"; } 
            else { x.style.display = "block"; }
        }
    </script>
</body>
</html>
