<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXTV - Cine en Casa</title>
    <style>
        :root { --dark: #0a0a0a; --accent: #e50914; --text: #ffffff; }
        body { margin: 0; background-color: var(--dark); color: var(--text); font-family: 'Roboto', sans-serif; }
        
        /* Header y Menú */
        .header { display: flex; justify-content: space-between; padding: 15px 20px; align-items: center; background: #141414; border-bottom: 2px solid var(--accent); }
        .logo { font-weight: bold; font-size: 26px; color: var(--accent); letter-spacing: 1px; }
        .menu-btn { font-size: 28px; cursor: pointer; }
        
        .nav-menu { display: none; background: #1a1a1a; padding: 15px; position: absolute; width: 100%; border-bottom: 3px solid var(--accent); }
        .nav-menu a { display: block; color: #ddd; padding: 12px; text-decoration: none; border-bottom: 1px solid #333; }
        
        /* Banner Estilo Cine */
        .banner { width: 100%; height: 300px; position: relative; overflow: hidden; }
        .banner img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .banner img.active { display: block; }
        
        /* Sección de Películas */
        .section-title { padding: 20px; font-size: 20px; color: var(--accent); border-left: 4px solid var(--accent); margin: 20px 0; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">NXTV</div>
        <div class="menu-btn" onclick="toggleMenu()">☰</div>
    </div>

    <div id="nav" class="nav-menu">
        <a href="peliculas.html">🎬 Películas</a>
        <a href="series.html">📺 Series</a>
        <a href="anime.html">🏮 Anime</a>
    </div>

    <div class="banner" id="banner">
        <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&w=800&q=80" class="active">
        <img src="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?auto=format&fit=crop&w=800&q=80">
    </div>

    <div class="section-title">ESTRENOS RECIENTES</div>

    <script>
        function toggleMenu() {
            var x = document.getElementById("nav");
            x.style.display = (x.style.display === "block") ? "none" : "block";
        }
        
        // Carrusel automático
        let index = 0;
        const images = document.querySelectorAll(".banner img");
        function changeImage() {
            images[index].classList.remove("active");
            index = (index + 1) % images.length;
            images[index].classList.add("active");
        }
        setInterval(changeImage, 4000);
    </script>
</body>
</html>
