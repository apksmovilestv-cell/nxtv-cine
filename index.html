<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NXTV - Streaming Pro</title>
    <style>
        /* Estilos base Dark */
        body { margin: 0; background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .header { display: flex; justify-content: space-between; padding: 20px; background: #000; align-items: center; border-bottom: 2px solid #e50914; }
        .logo { font-size: 24px; font-weight: bold; color: #e50914; }
        
        /* Banner Automático */
        .banner { width: 100%; height: 200px; overflow: hidden; position: relative; }
        .banner img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .banner img.active { display: block; }

        /* Navegación de secciones */
        .nav-links { display: flex; justify-content: space-around; background: #111; padding: 15px 0; border-bottom: 1px solid #333; }
        .nav-links a { color: #ccc; text-decoration: none; font-size: 14px; font-weight: bold; }
        .nav-links a:hover { color: #e50914; }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">NXTV</div>
        <div style="font-size: 25px; color: #e50914;">☰</div>
    </header>

    <!-- Navegación -->
    <nav class="nav-links">
        <a href="index.html">INICIO</a>
        <a href="peliculas.html">PELÍCULAS</a>
        <a href="series.html">SERIES</a>
        <a href="anime.html">ANIME</a>
    </nav>

    <!-- Banner Automático -->
    <div class="banner" id="banner">
        <img src="https://via.placeholder.com/800x300/222/fff?text=ESTRENO+1" class="active">
        <img src="https://via.placeholder.com/800x300/333/fff?text=ESTRENO+2">
        <img src="https://via.placeholder.com/800x300/444/fff?text=ESTRENO+3">
    </div>

    <script>
        let index = 0;
        const images = document.querySelectorAll(".banner img");
        function changeImage() {
            images[index].classList.remove("active");
            index = (index + 1) % images.length;
            images[index].classList.add("active");
        }
        setInterval(changeImage, 3000);
    </script>
</body>
</html>
